<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Local Family Tree Builder</title>
  <link rel="stylesheet" href="./src/styles/family-chart.css">
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0;
      padding: 0;
      background-color: #1e1e1e; /* Darker workspace background */
      color: #eaeaea;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    /* Left Sidebar Panel */
    #sidebar {
      width: 320px;
      min-width: 320px;
      background-color: #252526;
      border-right: 1px solid #333;
      padding: 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
      z-index: 10;
      overflow-y: auto;
    }

    #sidebar h3 {
      font-size: 15px;
      text-transform: uppercase;
      margin: 0 0 15px 0;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
      color: #fff;
    }

    .control-group {
      margin-bottom: 30px;
    }

    /* Toggle switches */
    .toggle-row {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      font-size: 14px;
      cursor: pointer;
    }

    .toggle-row input {
      margin-right: 10px;
      transform: scale(1.2);
      accent-color: #4CAF50;
      cursor: pointer;
    }

    /* Save Button styling */
    #exportBtn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px;
      font-size: 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      margin-top: auto;
    }
    #exportBtn:hover {
      background: #45a049;
    }

    /* Main Chart Area */
    #chart-container {
      flex-grow: 1;
      position: relative;
    }
    
    #FamilyChart {
      width: 100%;
      height: 100%;
      background-clip: padding-box;
    }
  </style>
  <script src="https://unpkg.com/d3@7"></script>
  <script src="./dist/family-chart.js"></script>
</head>
<body>

  <!-- Left Sidebar Panel -->
  <div id="sidebar">
    <div class="control-group">
      <h3>Detail Panel</h3>
      
      <label class="toggle-row">
        <input type="checkbox" id="toggleDetailView" checked>
        Enable Detail View
      </label>
      
      <label class="toggle-row">
        <input type="checkbox" id="toggleViewOnly">
        View Only
      </label>
      
      <label class="toggle-row">
        <input type="checkbox" id="toggleEditFirst" checked>
        Edit First (Open Form on Click)
      </label>
    </div>

    <div class="control-group" style="padding: 15px; background: #333; border-radius: 6px; box-shadow: inset 0 0 5px rgba(0,0,0,0.5);">
      <h3 style="border-bottom: none; margin-bottom: 5px;">Link Built-In People</h3>
      <p style="font-size: 11px; color: #aaa; margin-bottom: 15px; margin-top: 0;">Connect existing relatives to avoid duplicates (e.g. cousin marriage, adding existing parents).</p>
      
      <select id="linkPerson1" style="width: 100%; margin-bottom: 10px; padding: 6px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;"></select>
      
      <select id="linkType" style="width: 100%; margin-bottom: 10px; padding: 6px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;">
        <option value="parents">is Child of</option>
        <option value="spouses">is Spouse of</option>
      </select>
      
      <select id="linkPerson2" style="width: 100%; margin-bottom: 15px; padding: 6px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;"></select>
      
      <button id="applyLinkBtn" style="width: 100%; padding: 8px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">🔗 Create Link</button>
    </div>

    <!-- We placed Save to DB button here at the bottom of the tools -->
    <button id="exportBtn">💾 Save to Database</button>
  </div>

  <!-- Primary Wrapper for the Chart -->
  <div id="chart-container">
    <div id="FamilyChart" class="f3"></div>
  </div>

<script>
let storeData = null;
let currentData = null;

// UI State
let state = {
  detailView: true,
  viewOnly: false,
  editFirst: true
};

// Listeners for Custom UI Sidebar
document.getElementById('toggleDetailView').addEventListener('change', (e) => {
  state.detailView = e.target.checked;
  redrawTree();
});
document.getElementById('toggleViewOnly').addEventListener('change', (e) => {
  state.viewOnly = e.target.checked;
  redrawTree();
});
document.getElementById('toggleEditFirst').addEventListener('change', (e) => {
  state.editFirst = e.target.checked;
  redrawTree();
});

// Fetch Init Data
fetch('api.php')
  .then(response => response.json())
  .then(data => {
    if (data.error) {
      alert(data.error);
      return;
    }
    currentData = data;
    populateLinkDropdowns();
    redrawTree();
  })
  .catch(err => console.error("Could not fetch from database. Ensure you are running on Laragon and not Vite.", err));


function populateLinkDropdowns() {
  const p1 = document.getElementById('linkPerson1');
  const p2 = document.getElementById('linkPerson2');
  if(!p1 || !p2) return;
  p1.innerHTML = ''; p2.innerHTML = '';
  
  const sorted = [...currentData].sort((a,b) => (a.data['first name'] || '').localeCompare(b.data['first name'] || ''));
  sorted.forEach(p => {
    p1.add(new Option(p.data['first name'] || 'Unknown', p.id));
    p2.add(new Option(p.data['first name'] || 'Unknown', p.id));
  });
}

document.getElementById('applyLinkBtn')?.addEventListener('click', () => {
  const p1Menu = document.getElementById('linkPerson1');
  const p2Menu = document.getElementById('linkPerson2');
  if (!p1Menu || !p2Menu) return;

  const id1 = p1Menu.value;
  const id2 = p2Menu.value;
  const type = document.getElementById('linkType').value;
  
  if (id1 === id2) { alert("🚨 Cannot link a person to themselves!"); return; }
  
  const p1 = currentData.find(d => d.id === id1);
  const p2 = currentData.find(d => d.id === id2);
  if (!p1 || !p2) return;
  
  const ensureArray = (obj, key) => {
    if (!obj.rels) obj.rels = {};
    if (!obj.rels[key]) obj.rels[key] = [];
    return obj.rels[key];
  };

  if (type === 'parents') {
    const p1Parents = ensureArray(p1, 'parents');
    const p2Children = ensureArray(p2, 'children');
    if (!p1Parents.includes(id2)) p1Parents.push(id2);
    if (!p2Children.includes(id1)) p2Children.push(id1);
  } else if (type === 'spouses') {
    const p1Spouses = ensureArray(p1, 'spouses');
    const p2Spouses = ensureArray(p2, 'spouses');
    if (!p1Spouses.includes(id2)) p1Spouses.push(id2);
    if (!p2Spouses.includes(id1)) p2Spouses.push(id1);
  }

  // Strip out any auto-generated fake spouses before saving to DB
  const cleanData = currentData.filter(d => !d.to_add);
  const fakeIds = currentData.filter(d => d.to_add).map(d => d.id);
  cleanData.forEach(d => {
    if (d.rels.parents) d.rels.parents = d.rels.parents.filter(id => !fakeIds.includes(id));
    if (d.rels.spouses) d.rels.spouses = d.rels.spouses.filter(id => !fakeIds.includes(id));
    if (d.rels.children) d.rels.children = d.rels.children.filter(id => !fakeIds.includes(id));
  });

  const btn = document.getElementById('applyLinkBtn');
  if (btn) btn.innerHTML = "Saving...";

  const jsonStr = JSON.stringify(cleanData);
  fetch('api.php', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: jsonStr })
    .then(res => res.json())
    .then(() => {
      alert(`✅ Successfully linked ${p1.data['first name']} and ${p2.data['first name']}!\n\nThe page will now refresh to show the new connection.`);
      location.reload();
    })
    .catch(e => {
      console.error(e);
      alert("Failed to save link!");
      if (btn) btn.innerHTML = "🔗 Create Link";
    });
});


function redrawTree() {
  // Wipe the chart container clean so F3 can reinstantiate it with new settings
  document.getElementById('FamilyChart').innerHTML = '';
  
  if (!currentData || currentData.length === 0) return;

  const f3Chart = f3.createChart('#FamilyChart', currentData)
    .setTransitionTime(600)
    .setCardXSpacing(250)
    .setCardYSpacing(150);

  // Apply Detail View setting
  const cardDisplaySettings = state.detailView 
    ? [["first name"], ["avatar"]]   // Full detail (just Name & Avatar technically without bday)
    : [["first name"]];              // Minimal detail

  const f3Card = f3Chart.setCard(f3.CardHtml)
    .setCardDisplay(cardDisplaySettings);

  // Apply Editing logic settings
  const f3EditTree = f3Chart.editTree()
    .setFields(["first name", "avatar"])
    .setEditFirst(state.editFirst)
    .setCardClickOpen(f3Card);

  if (state.viewOnly) {
    f3EditTree.setNoEdit(); // Disable all click additions/edit popovers 
  }

  // Find the top-most ancestor to set as default view (avoiding arbitrary filtering)
  function getTopAncestor(id, visited = new Set()) {
    if (visited.has(id)) return { depth: 0, topId: id };
    visited.add(id);
    
    let person = currentData.find(d => d.id === id);
    if (!person || !person.rels || !person.rels.parents || person.rels.parents.length === 0) {
      return { depth: 0, topId: id };
    }
    
    let maxD = -1;
    let bestTop = id;
    for (let pId of person.rels.parents) {
      let res = getTopAncestor(pId, new Set(visited));
      if (res.depth > maxD) {
        maxD = res.depth;
        bestTop = res.topId;
      }
    }
    return { depth: maxD + 1, topId: bestTop };
  }
  
  let topId = getTopAncestor(currentData[0].id).topId;
  
  // Set the top-most ancestor as the root
  f3Chart.updateMainId(topId);

  f3Chart.updateTree({initial: true});
  
  // Update data reference so 'Save' captures latest chart state
  storeData = f3Chart.store.getData;
}

// Database Save Logic
const exportBtn = document.getElementById('exportBtn');
exportBtn.addEventListener('click', () => {
  if (!storeData) return;
  
  exportBtn.innerHTML = "Saving...";
  currentData = storeData(); // Sync the state to latest
  const jsonStr = JSON.stringify(currentData);

  fetch('api.php', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: jsonStr
  })
  .then(res => res.json())
  .then(result => {
    exportBtn.innerHTML = "✅ Saved Successfully!";
    setTimeout(() => exportBtn.innerHTML = "💾 Save to Database", 2000);
  })
  .catch(err => {
    console.error(err);
    exportBtn.innerHTML = "❌ Failed to Save";
    setTimeout(() => exportBtn.innerHTML = "💾 Save to Database", 2000);
  });
});

</script>
</body>
</html>
