<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Local Family Tree Builder</title>
  <link rel="stylesheet" href="./src/styles/family-chart.css">
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0;
      padding: 0;
      background-color: #1e1e1e; /* Darker workspace background */
      color: #eaeaea;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    /* Left Sidebar Panel */
    #sidebar {
      width: 320px;
      min-width: 320px;
      background-color: #252526;
      border-right: 1px solid #333;
      padding: 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
      z-index: 10;
      overflow-y: auto;
    }

    #sidebar h3 {
      font-size: 15px;
      text-transform: uppercase;
      margin: 0 0 15px 0;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
      color: #fff;
    }

    .control-group {
      margin-bottom: 30px;
    }

    /* Toggle switches */
    .toggle-row {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      font-size: 14px;
      cursor: pointer;
    }

    .toggle-row input {
      margin-right: 10px;
      transform: scale(1.2);
      accent-color: #4CAF50;
      cursor: pointer;
    }

    /* Save Button styling */
    #exportBtn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px;
      font-size: 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      margin-top: auto;
    }
    #exportBtn:hover {
      background: #45a049;
    }

    /* Main Chart Area */
    #chart-container {
      flex-grow: 1;
      position: relative;
    }
    
    /* Custom Searchable Dropdown */
    .cs-wrapper { position: relative; width: 100%; margin-bottom: 12px; font-family: inherit; user-select: none; }
    .cs-display { padding: 10px 12px; background: #222; border: 1px solid #444; border-radius: 4px; color: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; transition: border-color 0.2s, background 0.2s; }
    .cs-display:hover { background: #2a2a2a; border-color: #666; }
    .cs-display[data-open="true"] { border-color: #2196F3; border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .cs-display .cs-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cs-display .cs-arrow { font-size: 10px; color: #888; transition: transform 0.2s; }
    .cs-display[data-open="true"] .cs-arrow { transform: rotate(180deg); }
    
    .cs-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #252526; border: 1px solid #444; border-top: none; border-bottom-left-radius: 6px; border-bottom-right-radius: 6px; display: none; z-index: 1000; box-shadow: 0 8px 16px rgba(0,0,0,0.6); }
    .cs-dropdown[data-open="true"] { display: block; }
    .cs-search { width: 100%; box-sizing: border-box; padding: 10px 12px; background: #1e1e1e; border: none; border-bottom: 1px solid #333; color: #fff; font-size: 13px; outline: none; }
    .cs-search::placeholder { color: #666; }
    .cs-list { max-height: 200px; overflow-y: auto; list-style: none; margin: 0; padding: 0; }
    .cs-list::-webkit-scrollbar { width: 6px; }
    .cs-list::-webkit-scrollbar-track { background: #1e1e1e; }
    .cs-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    .cs-list::-webkit-scrollbar-thumb:hover { background: #666; }
    .cs-option { padding: 10px 12px; font-size: 13px; color: #ccc; cursor: pointer; display: flex; align-items: center; transition: background 0.1s; border-bottom: 1px solid #2a2a2a; }
    .cs-option.hidden { display: none; }
    .cs-option:hover { background: #2a2d3e; color: #fff; }
    .cs-option:last-child { border-bottom: none; }
    .cs-option img { width: 24px; height: 24px; border-radius: 50%; margin-right: 10px; background: #555; object-fit: cover; }
    .cs-option .empty-avatar { display: inline-block; width: 24px; height: 24px; border-radius: 50%; margin-right: 10px; background: #444; line-height:24px; text-align:center; font-size:10px; color:#aaa; font-weight: bold;}
    
    #FamilyChart {
      width: 100%;
      height: 100%;
      background-clip: padding-box;
    }
  </style>
  <script src="https://unpkg.com/d3@7"></script>
  <script src="./dist/family-chart.js"></script>
</head>
<body>

  <!-- Left Sidebar Panel -->
  <div id="sidebar">
    <div class="control-group">
      <h3>Detail Panel</h3>
      
      <label class="toggle-row">
        <input type="checkbox" id="toggleDetailView" checked>
        Enable Detail View
      </label>
      
      <label class="toggle-row">
        <input type="checkbox" id="toggleViewOnly">
        View Only
      </label>
      
      <label class="toggle-row">
        <input type="checkbox" id="toggleEditFirst" checked>
        Edit First (Open Form on Click)
      </label>
    </div>

    <div class="control-group" style="padding: 15px; background: #333; border-radius: 6px; box-shadow: inset 0 0 5px rgba(0,0,0,0.5);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
        <h3 style="border-bottom: none; margin: 0;">Link Built-In People</h3>
        <label style="font-size: 11px; cursor: pointer; color: #ccc; display: flex; align-items: center;">
          <input type="checkbox" id="enableAutoLink" style="margin-right: 5px; accent-color: #2196F3;"> Auto-fill from Tree
        </label>
      </div>
      <p style="font-size: 11px; color: #999; margin-bottom: 15px; margin-top: 0;">Connect existing relatives to avoid duplicates (e.g. cousin marriage, adding existing parents).</p>
      
      <div class="cs-wrapper" id="csPerson1" data-val="">
        <div class="cs-display">
          <span class="cs-label" style="flex-grow:1; overflow:hidden; text-overflow:ellipsis;">Select Person 1...</span>
          <span class="cs-clear" style="display:none; color:#f44336; font-size:16px; line-height:1; font-weight:bold; margin-right:6px;" title="Clear">&times;</span>
          <span class="cs-arrow">▼</span>
        </div>
        <div class="cs-dropdown">
          <input type="text" class="cs-search" placeholder="Type to search...">
          <ul class="cs-list"></ul>
        </div>
      </div>
      
      <select id="linkType" style="width: 100%; margin-bottom: 12px; padding: 10px 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; outline: none; cursor: pointer; font-size: 13px;">
        <option value="parents">is Child of</option>
        <option value="spouses">is Spouse of</option>
      </select>
      
      <div class="cs-wrapper" id="csPerson2" data-val="">
        <div class="cs-display">
          <span class="cs-label" style="flex-grow:1; overflow:hidden; text-overflow:ellipsis;">Select Person 2...</span>
          <span class="cs-clear" style="display:none; color:#f44336; font-size:16px; line-height:1; font-weight:bold; margin-right:6px;" title="Clear">&times;</span>
          <span class="cs-arrow">▼</span>
        </div>
        <div class="cs-dropdown">
          <input type="text" class="cs-search" placeholder="Type to search...">
          <ul class="cs-list"></ul>
        </div>
      </div>
      
      <button id="applyLinkBtn" style="width: 100%; padding: 8px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">🔗 Create Link</button>
    </div>

    <!-- We placed Save to DB button here at the bottom of the tools -->
    <button id="exportBtn">💾 Save to Database</button>
  </div>

  <!-- Primary Wrapper for the Chart -->
  <div id="chart-container">
    <div id="FamilyChart" class="f3"></div>
  </div>

<script>
let storeData = null;
let currentData = null;

// UI State
let state = {
  detailView: true,
  viewOnly: false,
  editFirst: true
};

// Listeners for Custom UI Sidebar
document.getElementById('toggleDetailView').addEventListener('change', (e) => {
  state.detailView = e.target.checked;
  redrawTree();
});
document.getElementById('toggleViewOnly').addEventListener('change', (e) => {
  state.viewOnly = e.target.checked;
  redrawTree();
});
document.getElementById('toggleEditFirst').addEventListener('change', (e) => {
  state.editFirst = e.target.checked;
  redrawTree();
});

// Fetch Init Data
fetch('api.php')
  .then(response => response.json())
  .then(data => {
    if (data.error) {
      alert(data.error);
      return;
    }
    currentData = data;
    populateLinkDropdowns();
    redrawTree();
  })
  .catch(err => console.error("Could not fetch from database. Ensure you are running on Laragon and not Vite.", err));


function populateLinkDropdowns() {
  const sorted = [...currentData].sort((a,b) => (a.data['first name'] || '').localeCompare(b.data['first name'] || ''));
  setupCustomSelect('csPerson1', sorted);
  setupCustomSelect('csPerson2', sorted);
}

function setupCustomSelect(wrapperId, data) {
  const wrapper = document.getElementById(wrapperId);
  if (!wrapper) return;
  const display = wrapper.querySelector('.cs-display');
  const label = wrapper.querySelector('.cs-label');
  const dropdown = wrapper.querySelector('.cs-dropdown');
  const search = wrapper.querySelector('.cs-search');
  const list = wrapper.querySelector('.cs-list');

  let debounceTimer;

  const renderList = (filterText = '') => {
    list.innerHTML = '';
    const term = filterText.toLowerCase();
    
    let renderedCount = 0;
    for (let i = 0; i < data.length; i++) {
        if (renderedCount >= 50) break; // Limit UI DOM nodes for extreme performance
        
        const p = data[i];
        const name = p.data['first name'] || 'Unknown';
        
        if (term !== '' && !name.toLowerCase().includes(term)) continue;

        const avatarStr = p.data.avatar 
          ? `<img src="${p.data.avatar}">` 
          : `<div class="empty-avatar">${name.charAt(0).toUpperCase()}</div>`;
          
        const li = document.createElement('li');
        li.className = 'cs-option';
        li.innerHTML = `${avatarStr} <span>${name}</span>`;
        
        li.addEventListener('click', () => {
          wrapper.dataset.val = p.id;
          label.textContent = name;
          const clearBtn = wrapper.querySelector('.cs-clear');
          if (clearBtn) clearBtn.style.display = 'inline-block';
          closeAll();
        });
        
        list.appendChild(li);
        renderedCount++;
    }
    
    if (renderedCount === 0) {
      list.innerHTML = '<li class="cs-option" style="color:#777; justify-content:center; cursor:default; pointer-events:none;">No results found</li>';
    }
  };

  // Toggle dropdown
  display.addEventListener('click', (e) => {
    // If clicking clear button
    const clearBtn = wrapper.querySelector('.cs-clear');
    if (e.target === clearBtn) {
      e.stopPropagation();
      wrapper.dataset.val = '';
      label.textContent = wrapperId === 'csPerson1' ? 'Select Person 1...' : 'Select Person 2...';
      clearBtn.style.display = 'none';
      return;
    }

    e.stopPropagation();
    const isOpen = display.dataset.open === "true";
    closeAll();
    if (!isOpen) {
      display.dataset.open = "true";
      dropdown.dataset.open = "true";
      search.value = '';
      renderList();
      search.focus();
    }
  });

  // Search filter with debounce buffer
  search.addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      renderList(e.target.value);
    }, 100);
  });

  // Prevent closing when clicking inside dropdown
  dropdown.addEventListener('click', e => e.stopPropagation());
}

function closeAll() {
  document.querySelectorAll('.cs-display, .cs-dropdown').forEach(el => el.dataset.open = "false");
}
document.addEventListener('click', closeAll);

// Makes canvas interactive for the Sidebar: Click a person on the tree to auto-fill the Link dropdowns!
document.getElementById('FamilyChart')?.addEventListener('click', (e) => {
  let node = e.target;
  let d3Data = null;
  // Traverse up to find the element that D3 natively bound data to
  while (node && node !== document.body) {
    if (node.__data__) {
      d3Data = node.__data__;
      break;
    }
    node = node.parentNode;
  }
  
  if (d3Data && d3Data.data && d3Data.data.id) {
    const id = d3Data.data.id;
    const name = d3Data.data.data['first name'] || 'Unknown';
    autoSelectLinkPerson(id, name);
  }
}, true); // Use capture phase so we catch it before any other popups block it

function autoSelectLinkPerson(id, name) {
  const enableAuto = document.getElementById('enableAutoLink');
  if (!enableAuto || !enableAuto.checked) return;

  const w1 = document.getElementById('csPerson1');
  const w2 = document.getElementById('csPerson2');
  if (!w1 || !w2) return;
  
  const fill = (wrapper) => {
    wrapper.dataset.val = id;
    wrapper.querySelector('.cs-label').textContent = name;
    
    const clearBtn = wrapper.querySelector('.cs-clear');
    if (clearBtn) clearBtn.style.display = 'inline-block';

    const display = wrapper.querySelector('.cs-display');
    display.style.transition = '0s';
    display.style.backgroundColor = '#4CAF50';
    setTimeout(() => {
      display.style.transition = 'background 0.8s';
      display.style.backgroundColor = '';
    }, 50);
  };

  // If first is empty or they are both filled (overwrite second)
  if (!w1.dataset.val) fill(w1);
  else if (!w2.dataset.val && w1.dataset.val !== id) fill(w2);
  else if (w1.dataset.val && w2.dataset.val && w1.dataset.val !== id) fill(w2);
}

document.getElementById('applyLinkBtn')?.addEventListener('click', () => {
  const wrapper1 = document.getElementById('csPerson1');
  const wrapper2 = document.getElementById('csPerson2');
  if (!wrapper1 || !wrapper2) return;

  const id1 = wrapper1.dataset.val;
  const id2 = wrapper2.dataset.val;
  const type = document.getElementById('linkType').value;
  
  if (!id1 || !id2) { alert("🚨 Please select both persons!"); return; }
  if (id1 === id2) { alert("🚨 Cannot link a person to themselves!"); return; }
  
  const p1 = currentData.find(d => d.id === id1);
  const p2 = currentData.find(d => d.id === id2);
  if (!p1 || !p2) return;
  
  const ensureArray = (obj, key) => {
    if (!obj.rels) obj.rels = {};
    if (!obj.rels[key]) obj.rels[key] = [];
    return obj.rels[key];
  };

  if (type === 'parents') {
    const p1Parents = ensureArray(p1, 'parents');
    const p2Children = ensureArray(p2, 'children');
    if (!p1Parents.includes(id2)) p1Parents.push(id2);
    if (!p2Children.includes(id1)) p2Children.push(id1);
  } else if (type === 'spouses') {
    const p1Spouses = ensureArray(p1, 'spouses');
    const p2Spouses = ensureArray(p2, 'spouses');
    if (!p1Spouses.includes(id2)) p1Spouses.push(id2);
    if (!p2Spouses.includes(id1)) p2Spouses.push(id1);
  }

  // Strip out any auto-generated fake spouses before saving to DB
  const cleanData = currentData.filter(d => !d.to_add);
  const fakeIds = currentData.filter(d => d.to_add).map(d => d.id);
  cleanData.forEach(d => {
    if (d.rels.parents) d.rels.parents = d.rels.parents.filter(id => !fakeIds.includes(id));
    if (d.rels.spouses) d.rels.spouses = d.rels.spouses.filter(id => !fakeIds.includes(id));
    if (d.rels.children) d.rels.children = d.rels.children.filter(id => !fakeIds.includes(id));
  });

  const btn = document.getElementById('applyLinkBtn');
  if (btn) btn.innerHTML = "Saving...";

  const jsonStr = JSON.stringify(cleanData);
  fetch('api.php', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: jsonStr })
    .then(res => res.json())
    .then(() => {
      alert(`✅ Successfully linked ${p1.data['first name']} and ${p2.data['first name']}!\n\nThe page will now refresh to show the new connection.`);
      location.reload();
    })
    .catch(e => {
      console.error(e);
      alert("Failed to save link!");
      if (btn) btn.innerHTML = "🔗 Create Link";
    });
});


function redrawTree() {
  // Wipe the chart container clean so F3 can reinstantiate it with new settings
  document.getElementById('FamilyChart').innerHTML = '';
  
  if (!currentData || currentData.length === 0) return;

  const f3Chart = f3.createChart('#FamilyChart', currentData)
    .setTransitionTime(600)
    .setCardXSpacing(250)
    .setCardYSpacing(150);

  // Apply Detail View setting
  const cardDisplaySettings = state.detailView 
    ? [["first name"], ["avatar"]]   // Full detail (just Name & Avatar technically without bday)
    : [["first name"]];              // Minimal detail

  const f3Card = f3Chart.setCard(f3.CardHtml)
    .setCardDisplay(cardDisplaySettings);

  // Apply Editing logic settings
  const f3EditTree = f3Chart.editTree()
    .setFields(["first name", "avatar"])
    .setEditFirst(state.editFirst)
    .setCardClickOpen(f3Card);

  if (state.viewOnly) {
    f3EditTree.setNoEdit(); // Disable all click additions/edit popovers 
  }

  // Find the top-most ancestor to set as default view (avoiding arbitrary filtering)
  function getTopAncestor(id, visited = new Set()) {
    if (visited.has(id)) return { depth: 0, topId: id };
    visited.add(id);
    
    let person = currentData.find(d => d.id === id);
    if (!person || !person.rels || !person.rels.parents || person.rels.parents.length === 0) {
      return { depth: 0, topId: id };
    }
    
    let maxD = -1;
    let bestTop = id;
    for (let pId of person.rels.parents) {
      let res = getTopAncestor(pId, new Set(visited));
      if (res.depth > maxD) {
        maxD = res.depth;
        bestTop = res.topId;
      }
    }
    return { depth: maxD + 1, topId: bestTop };
  }
  
  let topId = getTopAncestor(currentData[0].id).topId;
  
  // Set the top-most ancestor as the root
  f3Chart.updateMainId(topId);

  f3Chart.updateTree({initial: true});
  
  // Update data reference so 'Save' captures latest chart state
  storeData = f3Chart.store.getData;
}

// Database Save Logic
const exportBtn = document.getElementById('exportBtn');
exportBtn.addEventListener('click', () => {
  if (!storeData) return;
  
  exportBtn.innerHTML = "Saving...";
  currentData = storeData(); // Sync the state to latest
  const jsonStr = JSON.stringify(currentData);

  fetch('api.php', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: jsonStr
  })
  .then(res => res.json())
  .then(result => {
    exportBtn.innerHTML = "✅ Saved Successfully!";
    setTimeout(() => exportBtn.innerHTML = "💾 Save to Database", 2000);
  })
  .catch(err => {
    console.error(err);
    exportBtn.innerHTML = "❌ Failed to Save";
    setTimeout(() => exportBtn.innerHTML = "💾 Save to Database", 2000);
  });
});

</script>
</body>
</html>
